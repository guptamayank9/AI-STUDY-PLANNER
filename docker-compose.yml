version: "3.9"

services:
  mongo:
    image: mongo:6
    container_name: asp_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123

  redis:
    image: redis:7-alpine
    container_name: asp_redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: asp_backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://admin:password123@mongo:27017/studyplanner?authSource=admin
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your_jwt_secret_here
      - ML_SERVICE_URL=http://ml-service:8000
      - PORT=5000
    depends_on:
      - mongo
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules

  ml-service:
    build: ./ml-service
    container_name: asp_ml
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./ml-service:/app

  frontend:
    build: ./frontend
    container_name: asp_frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000
      - REACT_APP_ML_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  mongo_data:
